# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement. Provenance lets anyone cryptographically verify that a package
# was built by this exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli ≥ 0.23.0 is required. Earlier versions do not support the
# provenance flag passed by `npm run release` in CI, and the publish step will
# fail. Check the version installed in this project with:
#
#   npm list @n8n/node-cli
#
# To upgrade, add @n8n/node-cli@latest as a dev dependency using your package manager.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# This workflow authenticates to npm via OIDC Trusted Publishing — no long-lived
# NPM_TOKEN secret. Configure the trusted publisher once on npmjs.com:
#   1. Log in to npmjs.com and open this package's settings:
#        @nodrel-dev/n8n-nodes-fedex → Settings → Trusted Publisher
#   2. Click "Add a publisher" / "GitHub Actions" and fill in:
#        Organization or user: nodrel-dev
#        Repository:           n8n-fedex-node
#        Workflow filename:    publish.yml
#        Environment:          (leave blank unless you use GitHub Environments)
#   3. Save. No secret ever touches the repo — GitHub's OIDC token is used.
#
# Provenance is signed automatically by GitHub's OIDC infrastructure.
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# This workflow triggers on tags matching "*.*.*" (e.g. 0.2.0).
# If you prefer tags with a "v" prefix (e.g. v0.2.0), change the filter to:
#   tags: ['v*.*.*']
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run the following command locally to start an interactive release:
#
#   npm run release
#
# This will lint, build, prompt for a version bump, update the changelog,
# commit, tag, and push — which triggers this workflow to publish to npm.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
      # See "TAG CONVENTION" above if you prefer tags with a "v" prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v6

      # This package is pnpm-only (no package-lock.json), so install with pnpm.
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      # OIDC Trusted Publishing requires npm >= 11.5.1; the LTS image ships npm 10.x.
      - name: Upgrade npm for provenance/OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        # Publishes to npm via OIDC Trusted Publishing — no NPM_TOKEN secret needed.
        # npm authenticates using the workflow's OIDC identity (requires id-token:
        # write above and npm >= 11.5.1, installed above). Provenance is signed
        # automatically. Lint and build run as part of the release process.
        #
        # PREREQUISITE: the trusted publisher must be configured once on npmjs.com
        # for @nodrel-dev/n8n-nodes-fedex →
        #   Settings → Trusted Publisher → GitHub Actions
        #     Organization or user: nodrel-dev
        #     Repository:           n8n-fedex-node
        #     Workflow filename:    publish.yml
        #     Environment:          (leave blank)
        run: pnpm run release

  # Creates the GitHub Release for the tag after npm publish succeeds. Kept in a
  # separate job so the publish job above stays least-privilege (contents: read).
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      # Required to create the release.
      contents: write

    steps:
      - name: Create GitHub Release from tag
        # Auto-generates notes from the commits/PRs since the previous release.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
